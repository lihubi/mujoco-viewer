<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MuJoCo Viewer Vanilla Example</title>
  </head>
  <body>
    <main class="app">
      <aside class="panel">
        <h1>MuJoCo Viewer</h1>
        <div class="buttons">
          <button id="load-inline">Load Inline MJCF</button>
          <label class="file-button">
            Load Folder
            <input id="folder-input" type="file" webkitdirectory directory multiple />
          </label>
        </div>
        <div class="buttons">
          <button id="run">Run</button>
          <button id="pause">Pause</button>
          <button id="step">Step</button>
          <button id="reset">Reset</button>
        </div>
        <p id="status">Waiting for model.</p>
        <section>
          <h2>Controls</h2>
          <div id="controls"></div>
        </section>
        <section>
          <h2>Viewer Options</h2>
          <div id="options"></div>
        </section>
      </aside>
      <section id="viewer"></section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
